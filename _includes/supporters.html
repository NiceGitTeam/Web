<section class="supporters">
  <div class="container">
    <h3 class="supporters-heading">Supported by</h3>
    <div class="supporters-scroll">
      {% for supporter in site.supporters %}
      <a class="supporter" href="{{ supporter.url }}" target="_blank" rel="noopener noreferrer">
        <img src="{{ supporter.logo }}" alt="{{ supporter.name }}" />
        <span class="supporter-name">{{ supporter.name }}</span>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
